name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.configuration-cache=false"

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/*.apk
          retention-days: 7

  build-ios:
    name: Build iOS simulator app
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build iOS simulator app
        run: |
          xcodebuild build \
            -project iosApp/iosApp.xcodeproj \
            -configuration Debug \
            -scheme iosApp \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            ARCHS=arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=18.5 \
            OTHER_LDFLAGS="-Wl,-undefined,dynamic_lookup" \
            -verbose

      - name: Upload app folder
        uses: actions/upload-artifact@v4
        with:
          name: iphonesimulator-app
          path: build/Build/Products/Debug-iphonesimulator/*
          retention-days: 7

  build-desktop-macos:
    name: Build Desktop macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build macOS DMG
        run: ./gradlew :desktopApp:packageDmg

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-dmg
          path: desktopApp/build/compose/binaries/main/dmg/*.dmg
          retention-days: 7

  build-desktop-windows:
    name: Build Desktop Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build Windows MSI
        run: ./gradlew :desktopApp:packageMsi

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows-msi
          path: desktopApp/build/compose/binaries/main/msi/*.msi
          retention-days: 7

  build-desktop-linux:
    name: Build Desktop Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build Linux DEB
        run: ./gradlew :desktopApp:packageDeb

      - name: Upload Linux DEB
        uses: actions/upload-artifact@v4
        with:
          name: desktop-linux-deb
          path: desktopApp/build/compose/binaries/main/deb/*.deb
          retention-days: 7

  build-web:
    name: Build Web (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build WASM distribution
        run: ./gradlew :webApp:wasmJsBrowserDevelopmentDistribution

      - name: Upload web distribution
        uses: actions/upload-artifact@v4
        with:
          name: web-wasm-dist
          path: webApp/build/dist/wasmJs/developmentExecutable/
          retention-days: 7

  deploy-web:
    name: Deploy Web to Netlify
    runs-on: ubuntu-latest
    needs: [build-web]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create secrets.properties
        run: echo "COIN_API_KEY=${{ secrets.COIN_API_KEY }}" > secrets.properties

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Build WASM production distribution
        run: ./gradlew :webApp:wasmJsBrowserDistribution

      - name: Add COOP/COEP security headers
        run: |
          cat > webApp/build/dist/wasmJs/productionExecutable/_headers << 'EOF'
          /*
            Cross-Origin-Opener-Policy: same-origin
            Cross-Origin-Embedder-Policy: require-corp
          EOF

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3.0
        with:
          publish-dir: webApp/build/dist/wasmJs/productionExecutable
          production-branch: main
          production-deploy: true
          deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
